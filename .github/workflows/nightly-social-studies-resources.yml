name: Nightly Social Studies Resource Discovery

on:
  schedule:
    # Runs at 03:00 UTC every night (1 hour after Science, avoids DDG rate-limits)
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nightly-social-studies-resources
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/fetch-requirements.txt

      - name: Fetch Social Studies resources
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/fetch-resources.py --subject social_studies

      - name: Commit new resources
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/resources.json docs/resources.json 2>/dev/null || git add public/resources.json
          if git diff --cached --quiet; then
            echo "No new Social Studies resources found tonight."
            exit 0
          fi
          git commit -m "data: add nightly Social Studies resources [skip ci]"
          git push
