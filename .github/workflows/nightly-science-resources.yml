name: Nightly Science Resource Discovery

on:
  schedule:
    # Runs at 02:00 UTC every night
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nightly-science-resources
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/fetch-requirements.txt

      - name: Fetch Science resources
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/fetch-resources.py --subject science

      - name: Commit new resources
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/resources.json docs/resources.json 2>/dev/null || git add public/resources.json
          if git diff --cached --quiet; then
            echo "No new Science resources found tonight."
            exit 0
          fi
          git commit -m "data: add nightly Science resources [skip ci]"
          git push
